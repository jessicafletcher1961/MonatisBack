	function TypeOperation(code, libelleCourt) {
	
		this.code = code;
		this.libelleCourt = libelleCourt;
	}
	
	function Compte(identifiant, libelle, typeCompte, typeFonctionnement) {
		
		this.identifiant = identifiant;
		this.libelle = libelle;
		this.typeCompte = typeCompte;
		this.typeFonctionnement = typeFonctionnement;
	}

	function Operation(numero, libelle, typeOperation, dateValeur, montantEnEuros, compteDepense, compteRecette, sousCategorie, beneficiaires) {
	
		this.numero = numero;
		this.libelle = libelle;
		this.typeOperation = typeOperation;
		this.dateValeur = dateValeur;
		this.montantEnEuros = montantEnEuros;
		this.compteDepense = compteDepense;
		this.compteRecette = compteRecette;
		this.sousCategorie = sousCategorie;
		this.beneficiaires = beneficiaires;
	}

	function constituerTypesOperationsDepense(compteChoisi) {
	
		const selectionTypesOperations = [];

		let j = 0;
		if ( compteChoisi.typeFonctionnement == 'COURANT' ) {
			for ( let i=0 ; i<typesOperations.length; i++ ) {
				let typeOperation = typesOperations[i];
				if ( typeOperation.code == 'TRANSFERT' 
						|| typeOperation.code == 'DEPENSE'
						|| typeOperation.code == 'INVEST'
						|| typeOperation.code == 'DEPOT'
						|| typeOperation.code == 'COURANT-' ) {
					selectionTypesOperations[j++] = typeOperation;
				}
			}
		}
		else if ( compteChoisi.typeFonctionnement == 'FINANCIER' ) {
			for ( let i=0 ; i<typesOperations.length; i++ ) {
				let typeOperation = typesOperations[i];
				if ( typeOperation.code == 'LIQUID' 
						|| typeOperation.code == 'RETRAIT'
						|| typeOperation.code == 'FINANCIER-' ) {
					selectionTypesOperations[j++] = typeOperation;
				}
			}
		}
		else if ( compteChoisi.typeFonctionnement == 'BIEN' ) {
			for ( let i=0 ; i<typesOperations.length; i++ ) {
				let typeOperation = typesOperations[i];
				if ( typeOperation.code == 'VENTE' 
						|| typeOperation.code == 'BIEN-' ) {
					selectionTypesOperations[j++] = typeOperation;
				}
			}
		}

		if ( selectionTypesOperations.length == 0 ) {
			return null;
		}
		
		return selectionTypesOperations;
	}

				if ( typeOperation.code == 'INVEST'

		if ( selectionTypesOperations.length == 0 ) {

	}

	function constituerComptesContrepartieDepense(compteChoisi, typeOperationDepenseChoisi) {
	
		let typeCompte = null;
		let typeFonctionnement = null;
		
		if ( typeOperationDepenseChoisi != null ) {
			if ( typeOperationDepenseChoisi.code == 'TRANSFERT'
					|| typeOperationDepenseChoisi.code == 'RETRAIT' 
					|| typeOperationDepenseChoisi.code == 'LIQUID' 
					|| typeOperationDepenseChoisi.code == 'RECETTE' ) {
				typeCompte = 'INTERNE';
				typeFonctionnement = 'COURANT';
			}
			else if ( typeOperationDepenseChoisi.code == "DEPOT"
					|| typeOperationDepenseChoisi.code == "INVEST" ) {
				typeCompte = 'INTERNE';
				typeFonctionnement = 'FINANCIER';
			}
			else if ( typeOperationDepenseChoisi.code == "ACHAT" ) {
				typeCompte = 'INTERNE';
				typeFonctionnement = 'BIEN';
			}
			else if ( typeOperationDepenseChoisi.code == "VENTE"
					|| typeOperationDepenseChoisi.code == "DEPENSE" ) {
				typeCompte = 'EXTERNE';
				typeFonctionnement = null;
			}
		}

		const selectionComptes = [];
	
		let j = 0;
		for ( let i=0 ; i<comptes.length ; i++ ) {
			compte = comptes[i];
			if ( compte.typeCompte == typeCompte 
					&& compte.typeFonctionnement == typeFonctionnement
					&& (compteChoisi == null || compteChoisi.identifiant != compte.identifiant) ) {
				selectionComptes[j++] = compte;
			}
		}

		if ( selectionComptes.length == 0 ) {
			return null;
		}
		
		return selectionComptes;
	}

			}
			else if ( typeOperationRecetteChoisi.code == "VENTE" ) {
				typeCompte = 'INTERNE';
				typeFonctionnement = 'BIEN';
			}
			else if ( typeOperationRecetteChoisi.code == "RECETTE"
					|| typeOperationRecetteChoisi.code == "ACHAT") {
				typeCompte = 'EXTERNE';
				typeFonctionnement = null;
			}

		const selectionComptes = [];
	
		let j = 0;
		for ( let i=0 ; i<comptes.length ; i++ ) {

	function rechercherUnCompteTechnique() {

		for ( let i=0 ; i<operations.length ; i++ ) {

	function dessineBoutonRetour(compteChoisi, typeOperationDepenseChoisi, typeOperationRecetteChoisi, compteContrepartieChoisi, operationEnregistree) {

		if ( compteChoisi != null ) {
		
			let onclick = '';
		
			if ( typeOperationDepenseChoisi == null && typeOperationRecetteChoisi == null ) {
				onclick = "afficheLaSuite(null, null, null, null, null);";
			}
			else if ( compteContrepartieChoisi == null ) {
				onclick = "afficheLaSuite('" + compteChoisi.identifiant + "', null, null, null, null);";
			}
			else if ( operationEnregistree == null ) {
				if ( typeOperationDepenseChoisi != null ) {
					onclick = "afficheLaSuite('" + compteChoisi.identifiant + "', '" + typeOperationDepenseChoisi.code + "', null, null, null);";
				}
				else {
					onclick = "afficheLaSuite('" + compteChoisi.identifiant + "', null, '" + typeOperationRecetteChoisi.code + "', null, null);";
				}
			}
						
			return '<input id="retourbtn", type="button" value="RETOUR" onclick="' + onclick + '">';
		}
		
		return '';
	}

	function afficheLaSuite(identifiantCompteChoisi, codeTypeOperationDepenseChoisi, codeTypeOperationRecetteChoisi, identifiantCompteContrepartieChoisi, numeroOperationSaisie) {

		let compteChoisi;
		let typeOperationDepenseChoisi = null;
		let typeOperationRecetteChoisi = null;
		let compteContrepartieChoisi = null;
		let operationSaisie = null;
		
		if ( identifiantCompteChoisi != null ) {
			for ( let i=0 ; i<comptes.length ; i++ ) {
				compte = comptes[i];
				if ( compte.identifiant == identifiantCompteChoisi ) {
					compteChoisi = compte;
					break;
				}
			}
		}
		
		if ( codeTypeOperationDepenseChoisi != null ) {
			for ( let i=0 ; i<typesOperations.length ; i++ ) {
				typeOperation = typesOperations[i];
				if ( typeOperation.code == codeTypeOperationDepenseChoisi ) {
					typeOperationDepenseChoisi = typeOperation;
					break;
				}
			}
		}

		if ( codeTypeOperationRecetteChoisi != null ) {
			for ( let i=0 ; i<typesOperations.length ; i++ ) {
				typeOperation = typesOperations[i];
				if ( typeOperation.code == codeTypeOperationRecetteChoisi ) {
					typeOperationRecetteChoisi = typeOperation;
					break;
				}
			}
		}
		
		if ( identifiantCompteContrepartieChoisi != null ) {
			for ( let i=0 ; i<comptes.length ; i++ ) {
				compte = comptes[i];
				if ( compte.identifiant == identifiantCompteContrepartieChoisi ) {
					compteContrepartieChoisi = compte;
					break;
				}
			}
		}

		if ( numeroOperationSaisie != null ) {
			for ( let i=0 ; i<operations.length ; i++ ) {
				operation = operations[i];
				if ( operation.numero == numeroOperationSaisie ) {
					operationSaisie = operation;
					break;
				}
			}
		}

		if ( compteChoisi == null ) {

			// Préparations choix premier compte

			operations.length = 0;

			document.getElementById("choisi").innerHTML = "";
			document.getElementById("gauche").innerHTML = "";
			document.getElementById("milieu").innerHTML = dessineSelectCompte();
			document.getElementById("droite").innerHTML = "";
			document.getElementById("boutons").innerHTML = "";
			document.getElementById("operations").innerHTML = "";
			
			ajouteLigneLog("Coucou Thibault :)");
		}
		else if ( typeOperationDepenseChoisi == null && typeOperationRecetteChoisi == null ) {

			// Premier compte choisi 
			// Préparation choix type opération

			document.getElementById("choisi").innerHTML = dessineElementsChoisis(compteChoisi, null, null, null);;
			document.getElementById("gauche").innerHTML = dessineSelectTypeOperationDepense(compteChoisi);
			document.getElementById("milieu").innerHTML = " OU BIEN ";
			document.getElementById("droite").innerHTML = dessineSelectTypeOperationRecette(compteChoisi);
			document.getElementById("boutons").innerHTML = dessineBoutonRetour(compteChoisi, null, null, null, null);
			
			ajouteLigneLog("Compte choisi = " + compteChoisi.identifiant);
			ajouteLigneLog("URL à utiliser pour la constitution des deux listes de types d'opérations présentées : /monatis/operations/compatibilite/typesoperations/" + compteChoisi.identifiant);
		}
		else if ( typeOperationDepenseChoisi != null && compteContrepartieChoisi == null && constituerComptesContrepartieDepense(compteChoisi, typeOperationDepenseChoisi) != null) {

			// Type opération choisi dans la colonne de gauche (en dépense), ce type d'opération nécessitant un second compte de contrepartie
			// Préparation choix compte de contrepartie

			document.getElementById("choisi").innerHTML = dessineElementsChoisis(compteChoisi, typeOperationDepenseChoisi, null, null);
			document.getElementById("gauche").innerHTML = compteChoisi.identifiant;
			document.getElementById("milieu").innerHTML = " ==[" + typeOperationDepenseChoisi.code + "]==> ";
			document.getElementById("droite").innerHTML = dessineSelectCompteContrepartieDepense(compteChoisi, typeOperationDepenseChoisi);
			document.getElementById("boutons").innerHTML = dessineBoutonRetour(compteChoisi, typeOperationDepenseChoisi, null, null, null);

			ajouteLigneLog("Type d'opération choisi (en dépense du compte choisi) = " + typeOperationDepenseChoisi.code);
			ajouteLigneLog("URL à utiliser pour l'affichage des comptes de contrepartie : /monatis/operations/compatibilite/comptes/recette/" + typeOperationDepenseChoisi.code + "/" + compteChoisi.identifiant);
		}
		else if ( typeOperationRecetteChoisi != null && compteContrepartieChoisi == null && constituerComptesContrepartieRecette(compteChoisi, typeOperationRecetteChoisi) != null) {

			// Type opération choisi dans la colonne de droite (en recette), ce type d'opération nécessitant un second compte de contrepartie
			// Préparation choix compte de contrepartie

			document.getElementById("choisi").innerHTML = dessineElementsChoisis(compteChoisi, null, typeOperationRecetteChoisi, null);
			document.getElementById("gauche").innerHTML = dessineSelectCompteContrepartieRecette(compteChoisi, typeOperationRecetteChoisi);
			document.getElementById("milieu").innerHTML = " ==[" + typeOperationRecetteChoisi.code + "]==> ";
			document.getElementById("droite").innerHTML = compteChoisi.identifiant;
			document.getElementById("boutons").innerHTML = dessineBoutonRetour(compteChoisi, null, typeOperationRecetteChoisi, null, null);

			ajouteLigneLog("Type d'opération choisi (en recette du compte choisi) = " + typeOperationRecetteChoisi.code);
			ajouteLigneLog("URL à utiliser pour l'affichage des comptes de contrepartie : /monatis/operations/compatibilite/comptes/depense/" + typeOperationRecetteChoisi.code + "/" + compteChoisi.identifiant);
		}
		else if ( operationSaisie == null ) {

			// Compte de contrepartie choisi ou inutile
			// Préparations de la saisie et de l'enregistrement de l'opération

			document.getElementById("choisi").innerHTML = dessineElementsChoisis(compteChoisi, typeOperationDepenseChoisi, typeOperationRecetteChoisi, compteContrepartieChoisi);
			document.getElementById("gauche").innerHTML = "";
			document.getElementById("milieu").innerHTML = dessineSaisieOperation(typeOperationDepenseChoisi, typeOperationRecetteChoisi);
			document.getElementById("droite").innerHTML = "";
			document.getElementById("boutons").innerHTML = 
				dessineBoutonRetour(compteChoisi, typeOperationDepenseChoisi, typeOperationRecetteChoisi, compteContrepartieChoisi, null)
				+ dessineBoutonEnregistrement(compteChoisi, typeOperationDepenseChoisi, typeOperationRecetteChoisi, compteContrepartieChoisi);


			if ( compteContrepartieChoisi == null ) {
				ajouteLigneLog("Aucun compte de contrepartie n'est nécessaire pour ce type d'opération");				
			}
			else {
				ajouteLigneLog("Compte de contrepartie choisi = " + compteContrepartieChoisi.identifiant);
			}
		}
		else {

			// Opération saisie enregistrée
			
			let typeOperationChoisi = null;
			let compteDepenseChoisi = null;
			let compteRecetteChoisi = null;

			if ( typeOperationDepenseChoisi != null ) {
				typeOperationChoisi = typeOperationDepenseChoisi;
				compteDepenseChoisi = compteChoisi;
				if ( compteContrepartieChoisi != null ) {
					compteRecetteChoisi = compteContrepartieChoisi;
				}
				else {
					compteRecetteChoisi = rechercherUnCompteTechnique();
				}
			}
			if ( typeOperationRecetteChoisi != null ) {
				typeOperationChoisi = typeOperationRecetteChoisi;
				compteRecetteChoisi = compteChoisi;
				if ( compteContrepartieChoisi != null ) {
					compteDepenseChoisi = compteContrepartieChoisi;
				}
				else {
					compteDepenseChoisi = rechercherUnCompteTechnique();
				}
			}

			document.getElementById("choisi").innerHTML = dessineElementsChoisis(compteChoisi, null, null, null);
			document.getElementById("gauche").innerHTML = "";
			document.getElementById("milieu").innerHTML = "";
			document.getElementById("droite").innerHTML = "";
			document.getElementById("boutons").innerHTML = dessineBoutonNouvelleOperation(compteChoisi);
			document.getElementById("operations").innerHTML = dessineOperations(compteChoisi)
			
			ajouteLigneLog("Récapitulatif des choix : " + compteDepenseChoisi.identifiant + " ==[" + typeOperationChoisi.code + "]==> " + compteRecetteChoisi.identifiant);
			ajouteLigneLog("Opération n° " + operationSaisie.numero + " créée");
			ajouteLigneLog("URL à utiliser pour récupérer quelques opérations d'un compte donné : /monatis/operations/selection/dernieres_par_compte (avec OperationSelectionRequestDto)")
		}
	}

	function enregistrerOperation(identifiantCompteChoisi, codeTypeOperationDepenseChoisi, codeTypeOperationRecetteChoisi, identifiantCompteContrepartieChoisi) {

		let codeTypeOperationChoisi = null;
		let identifiantCompteDepenseChoisi = null;
		let identifiantCompteRecetteChoisi = null;

		if ( codeTypeOperationDepenseChoisi != null ) {
			codeTypeOperationChoisi = codeTypeOperationDepenseChoisi;
			identifiantCompteDepenseChoisi = identifiantCompteChoisi;
			if ( identifiantCompteContrepartieChoisi != null ) {
				identifiantCompteRecetteChoisi = identifiantCompteContrepartieChoisi;
			}
			else {
				identifiantCompteRecetteChoisi = rechercherUnCompteTechnique().identifiant;
			}
		}
		if ( codeTypeOperationRecetteChoisi != null ) {
			codeTypeOperationChoisi = codeTypeOperationRecetteChoisi;
			identifiantCompteRecetteChoisi = identifiantCompteChoisi;
			if ( identifiantCompteContrepartieChoisi != null ) {
				identifiantCompteDepenseChoisi = identifiantCompteContrepartieChoisi;
			}
			else {
				identifiantCompteDepenseChoisi = rechercherUnCompteTechnique().identifiant;
			}
		}

		let numero = document.getElementById('numero').value;
		let libelle = document.getElementById('libelle').value;
		let dateValeur = document.getElementById('date').value;
		let montant = document.getElementById('montant').value;
		let sousCategorie = null;
		let beneficiaires = null;
		if ( codeTypeOperationChoisi == 'RECETTE' || codeTypeOperationChoisi == 'DEPENSE' ) {
			sousCategorie = document.getElementById('souscategorie').value;
			beneficiaires = document.getElementById('beneficiaires').value;
		}
		
		// numero, libelle, typeOperation, dateValeur, montantEnEuros, compteDepense, compteRecette, sousCategorie, beneficiaires
		let operation = new Operation(
			numero, 
			libelle, 
			codeTypeOperationChoisi, 
			dateValeur, 
			montant, 
			identifiantCompteDepenseChoisi, 
			identifiantCompteRecetteChoisi, 
			sousCategorie, 
			beneficiaires);

		operations[operations.length] = operation;
		
		afficheLaSuite(identifiantCompteChoisi, codeTypeOperationDepenseChoisi, codeTypeOperationRecetteChoisi, identifiantCompteContrepartieChoisi, numero);
	}

	let numeroOperationSaisie = null;
	
	afficheLaSuite(identifiantCompteChoisi, codeTypeOperationChoisi, identifiantCompteDepenseChoisi, identifiantCompteRecetteChoisi, numeroOperationSaisie);

</script>
